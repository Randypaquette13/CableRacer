<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>cableracer</title>
  </head>
  <body>
    <!-- game-mount: Phaser canvas only. phone-game-controls: below canvas on touch (see phoneGameControls.ts). -->
    <div id="app">
      <div class="game-layout">
        <div id="game-mount"></div>
        <div id="phone-game-controls" class="phone-game-controls" hidden>
          <button type="button" class="phone-game-btn" id="phone-hook-l">Hook L</button>
          <button type="button" class="phone-game-btn" id="phone-release">Release</button>
          <button type="button" class="phone-game-btn" id="phone-hook-r">Hook R</button>
        </div>
      </div>
      <div id="name-entry-overlay" class="name-entry-overlay" hidden>
        <div class="name-entry-card">
          <p id="name-entry-title" class="name-entry-title">Top 3 score! Enter your name:</p>
          <p id="name-entry-checking" class="name-entry-checking" hidden>Checking leaderboard…</p>
          <div id="name-entry-form-row" class="name-entry-form-row">
            <input
              type="text"
              id="name-entry-input"
              class="name-entry-input"
              maxlength="24"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="name-entry-submit" class="name-entry-submit">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
