<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>cableracer</title>
  </head>
  <body>
    <!-- Overlay in #app with canvas; main.ts sets scale.fullscreenTarget: 'app' so fullscreen includes both. -->
    <div id="app">
      <div id="name-entry-overlay" class="name-entry-overlay" hidden>
        <div class="name-entry-card">
          <p id="name-entry-title" class="name-entry-title">Top 3 score! Enter your name:</p>
          <p id="name-entry-checking" class="name-entry-checking" hidden>Checking leaderboard…</p>
          <div id="name-entry-form-row" class="name-entry-form-row">
            <input
              type="text"
              id="name-entry-input"
              class="name-entry-input"
              maxlength="24"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="name-entry-submit" class="name-entry-submit">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
